<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiroides: El Termostato Metabólico</title>

  <!-- Tipografías -->
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@300;400;600&display=swap"
    rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>


  <div class="bg-layer"></div>

  <!-- Tarjeta principal -->
  <div class="card">

    <!-- Encabezado -->
    <header class="header">
      <p class="header-sub">Endocrinology</p>
      <h1>Tiroides: El Termostato Metabólico</h1>
      <div class="header-cross" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="#1e6bb8">
          <rect x="10" y="1"  width="8" height="26" rx="2"/>
          <rect x="1"  y="10" width="26" height="8"  rx="2"/>
        </svg>
      </div>
    </header>

    <!-- Contenido: imagen + simulador -->
    <main class="content">

      <!-- Panel izquierdo: diagrama HPT -->
      <section class="left-panel">
        <img
          src="imagenes/iman1.webp"
          alt="Eje HPT – Hipotálamo, Hipófisis, Tiroides">
      </section>

      <!-- Panel derecho: simulador -->
      <section class="right-panel">
        <h2 class="sim-title">Simulador de Perfiles Hormonales</h2>

        <!-- Campos de entrada -->
        <div class="input-row">
          <label class="lbl" for="tsh">
            TSH <span class="unit">(mIU/L)</span>
          </label>
          <input
            class="field"
            id="tsh"
            type="number"
            step="0.01"
            min="0"
            value="8.5"
            aria-label="TSH en mIU/L">
        </div>

        <div class="input-row">
          <label class="lbl" for="t4">
            T4 Libre <span class="unit">(ng/dL)</span>
          </label>
          <input
            class="field"
            id="t4"
            type="number"
            step="0.01"
            min="0"
            value="0.6"
            aria-label="T4 libre en ng/dL">
        </div>

        <div class="input-row">
          <label class="lbl" for="t3">
            T3 Libre <span class="unit">(pg/mL)</span>
          </label>
          <input
            class="field"
            id="t3"
            type="number"
            step="0.01"
            min="0"
            value="0.5"
            aria-label="T3 libre en pg/mL">
        </div>

        <!-- Referencia de rangos normales -->
        <div class="ref-strip" role="note" aria-label="Rangos de referencia">
          <span class="ref-pill"><b>TSH</b> 0.4 – 4.0</span>
          <span class="ref-pill"><b>T4L</b> 0.8 – 1.8</span>
          <span class="ref-pill"><b>T3L</b> 2.3 – 4.2</span>
        </div>

        <!-- Botón de acción -->
        <button class="btn" onclick="calcular()" type="button">
          Calcular Diagnóstico
        </button>

        <!-- Panel de resultado -->
        <div
          class="result-box hidden"
          id="rbox"
          role="status"
          aria-live="polite">
          <p class="r-lbl"  id="rlbl">DIAGNÓSTICO</p>
          <p class="r-name" id="rname">—</p>
          <p class="r-desc" id="rdesc">—</p>
        </div>

      </section>
    </main>

  </div>

  <script src="js/diagnostics.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/background.js"></script>

</body>
</html>
